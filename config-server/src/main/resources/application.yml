spring.application.name: config-server

management:
  endpoints:
    web:
      exposure:
        include: "*"

spring:
  cloud:
    config:
      server:
        git:
          uri: https://github.com/RahulGupta77/connectu-config-server-credentials
          username: ${CONFIG_GIT_USERNAME}
          password: ${CONFIG_GIT_PASSWORD}
          default-label: main

server:
  port: 8888

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

